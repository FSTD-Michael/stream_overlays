<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Live Overlay (Topo Banner Test)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="common/ui.css" />

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: transparent;
      font-family: Arial, sans-serif;
    }

    .overlay-panel {
      position: fixed;
      bottom: 20px;
      left: 20px;
      padding: 20px 30px;
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .logo-inline {
      height: 100px;
      opacity: 0.9;
    }

    .target-location {
      font-size: 36px;
      font-weight: bold;
      white-space: nowrap;
    }

    .gps-meta {
      font-size: 16px;
      font-weight: 500;
      white-space: nowrap;
    }

    .gps-meta.stale {
      color: rgba(255, 120, 120, 0.95);
    }

    .clock-line {
      font-size: 16px;
      font-weight: 600;
      white-space: nowrap;
      margin-top: -6px;
      letter-spacing: 0.5px;
    }

    .heading-arrow {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-bottom: 18px solid rgba(255, 255, 255, 0.9);
      transform: translate(-50%, -65%) rotate(0deg);
      transform-origin: 50% 80%;
      filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.8));
      z-index: 3;
      display: none;
    }

    .social-bar { display: none; }

    #map-container {
      width: 350px;
      height: 350px;
      border-radius: 50%;
      overflow: hidden;
      position: absolute;
      bottom: 20px;
      right: 20px;
      border: 4px solid rgba(255, 255, 255, 0.10);
      box-shadow:
        0 0 0 4px rgba(255, 255, 255, 0.10),
        0 0 10px rgba(0, 0, 0, 0.3);
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .pulse-wrapper {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .pulse {
      width: 12px;
      height: 12px;
      background-color: #f00;
      border: 2px solid white;
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
    }

    .pulse-ring {
      width: 20px;
      height: 20px;
      background: rgba(255, 0, 0, 0.5);
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: pulse-ring 2s ease-out infinite;
      z-index: 1;
    }

    @keyframes pulse-ring {
      0% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
      70% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; }
      100% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; }
    }

    /* Donation Banner Styles */
    .support-banner {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: calc(100% - 40px);
      max-width: 1100px;
      box-sizing: border-box;
      flex-wrap: wrap;
      gap: 16px;
      opacity: 0;
      transition: opacity 1s ease-in-out;
    }

    .support-banner.visible {
      opacity: 1;
    }

    .support-text {
      font-size: 18px;
      font-weight: 700;
      text-align: left;
      flex: 1 1 auto;
      color: rgba(255, 255, 255, 0.92);
      line-height: 1.25;
    }

    @keyframes pulse-glow {
      0%, 100% {
        box-shadow: 0 0 10px rgba(100, 180, 255, 0.1);
        text-shadow: 0 0 2px rgba(255,255,255,0.4);
      }
      50% {
        box-shadow: 0 0 16px rgba(100, 180, 255, 0.35);
        text-shadow: 0 0 6px rgba(100, 180, 255, 0.6);
      }
    }
  </style>
</head>
<body>

  <!-- Static Overlay -->
  <div class="overlay-panel tf-panel tf-topo-lines">
    <img src="fisters_logo.png" class="logo-inline" alt="Logo">
    <div class="tf-col">
      <div class="tf-title target-location" id="target-text">Target: ...</div>
      <div class="tf-row">
        <div class="tf-meta clock-line" id="clock">--:--:--</div>
        <div class="tf-meta gps-meta" id="gps-meta">GPS: ...</div>
      </div>
      <div class="tf-chipbar">
        <span class="tf-chip"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/x.svg" alt="X" />@twisterfisters</span>
        <span class="tf-chip"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/youtube.svg" alt="YouTube" />@twisterfisters</span>
        <span class="tf-chip"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/instagram.svg" alt="Instagram" />@twisterfisters</span>
      </div>
    </div>
  </div>

  <!-- Map -->
  <div id="map-container">
    <div id="map"></div>
  </div>

  <!-- Donation Banner -->
  <div class="support-banner tf-panel tf-topo-lines" id="donationBanner">
    <div class="support-text">
      Support the chase: grab merch and help keep us on the road.
    </div>
    <a class="tf-cta" href="https://shop.twisterfisters.com" rel="noopener noreferrer">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M7 7V6a5 5 0 0 1 10 0v1h2a1 1 0 0 1 1 1l-1 12a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2L4 8a1 1 0 0 1 1-1h2Zm2 0h6V6a3 3 0 0 0-6 0v1Zm-2 2 1 11h10l1-11H7Z"/>
      </svg>
      shop.twisterfisters.com
    </a>
  </div>

  <!-- Scripts -->
  <script src="common/location.js?v=1"></script>
  <script src="common/state.js?v=1"></script>
  <script src="common/clock.js?v=1"></script>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="common/map_overlays.js?v=8"></script>
  <script>
    const map = L.map('map', {
      center: [0, 0],
      zoom: 9,
      zoomControl: false,
      attributionControl: false,
      dragging: false,
      scrollWheelZoom: false,
      doubleClickZoom: false,
      boxZoom: false,
      keyboard: false,
      tap: false,
      touchZoom: false
    });

    window.OverlayMapOverlays.addDarkBasemap(map);

    const pulseIcon = L.divIcon({
      className: '',
      html: `
        <div class="pulse-wrapper">
          <div class="pulse-ring"></div>
          <div class="pulse"></div>
        </div>
      `,
      iconSize: [20, 20],
      iconAnchor: [10, 10]
    });

    window.OverlayClock.startClock('clock');

    const headingMarker = window.OverlayMapOverlays.createHeadingMarker(map);
    const nwsWarnings = window.OverlayMapOverlays.createWarningsLayer(map);
    const radar = window.OverlayMapOverlays.createRadarLayer(map);
    radar.init();

    // Live radar product switching via state.json / worker /state (keeps same overlay URL on Yolobox)
    if (window.OverlayState) {
      window.OverlayState.startPolling((state) => {
        if (state && state.radarProduct) radar.setProduct(state.radarProduct);
      }, 4000);
    }

    function formatLatLon(lat, lon) {
      if (typeof lat !== 'number' || typeof lon !== 'number' || !Number.isFinite(lat) || !Number.isFinite(lon)) {
        return null;
      }
      const latAbs = Math.abs(lat).toFixed(5);
      const lonAbs = Math.abs(lon).toFixed(5);
      const latHem = lat >= 0 ? 'N' : 'S';
      const lonHem = lon >= 0 ? 'E' : 'W';
      return `${latAbs}${latHem}, ${lonAbs}${lonHem}`;
    }

    function setGpsMeta(updatedAt, lat, lon) {
      const el = document.getElementById('gps-meta');
      if (!el) return;
      const coords = formatLatLon(lat, lon);

      if (!updatedAt) {
        el.textContent = coords ? `GPS: live | ${coords}` : 'GPS: live';
        el.classList.remove('stale');
        return;
      }

      const t = Date.parse(updatedAt);
      if (!Number.isFinite(t)) {
        el.textContent = coords ? `GPS: live | ${coords}` : 'GPS: live';
        el.classList.remove('stale');
        return;
      }

      const ageMs = Date.now() - t;
      if (ageMs > 30000) {
        const ageS = Math.max(0, Math.round(ageMs / 1000));
        el.textContent = coords ? `GPS: stale (${ageS}s) | ${coords}` : `GPS: stale (${ageS}s)`;
        el.classList.add('stale');
      } else {
        el.textContent = coords ? `GPS: live | ${coords}` : 'GPS: live';
        el.classList.remove('stale');
      }
    }

    async function updateLocation() {
      try {
        const { lat, lon, location, updatedAt, heading } = await window.OverlayLocation.fetchLocation();

        map.setView([lat, lon]);

        headingMarker.set(lat, lon, heading);

        document.getElementById('target-text').innerText = `Target: ${location}`;
        setGpsMeta(updatedAt, lat, lon);
        radar.refresh(lat, lon);
        nwsWarnings.update(lat, lon);
      } catch (e) {
        console.error("Failed to fetch location data:", e);
      }
    }

    updateLocation();
    setInterval(updateLocation, 10000);

    // Donation Banner
    const banner = document.getElementById('donationBanner');

    function cycleBanner() {
      banner.classList.add('visible');
      setTimeout(() => banner.classList.remove('visible'), 15000);
    }

    cycleBanner(); // initial
    setInterval(cycleBanner, 180000); // every 3 minutes
  </script>
</body>
</html>
